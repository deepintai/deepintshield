name: CI

# Self-validates the public SDK on every push / PR: the offline (httpx.MockTransport)
# test suite across supported Python versions, plus a package build + metadata
# check so a release can never ship a broken sdist/wheel. Framework-specific
# tests importorskip when their extra isn't installed, so this stays fast.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (dev + langgraph extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,langgraph]"

      - name: Smoke import
        run: python -c "import deepintshield; from deepintshield import DeepintShield, GuardrailDenied; print('deepintshield', deepintshield.__version__)"

      - name: Run tests
        run: python -m pytest -q

  package:
    name: Build + metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build + twine check
        run: |
          python -m pip install --upgrade build twine
          rm -rf dist/ build/ src/*.egg-info
          python -m build
          python -m twine check dist/*
